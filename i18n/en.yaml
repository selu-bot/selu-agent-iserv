agent:
  name: IServ School Assistant
  description: Helps you stay on top of parent letters and notifications from school
  long_description: >-
    Checks for new parent letters (Elternbriefe) from IServ, reads their content,
    sends read confirmations, downloads attachments, and shows school notifications.

tools:
  iserv__check_parent_letters:
    label: Check parent letters
    description: Fetch the list of parent letters from school
  iserv__get_parent_letter:
    label: Read parent letter
    description: Read the full content of a specific parent letter
  iserv__confirm_parent_letter:
    label: Confirm parent letter
    description: Send read confirmation for a parent letter
    approval:
      label: Confirm receipt
      message: "Send a read confirmation for this parent letter? This cannot be undone."
  iserv__download_attachment:
    label: Download attachment
    description: Download a file attachment from a parent letter
  iserv__check_notifications:
    label: Check notifications
    description: Fetch recent notifications from IServ
