agent:
  name: IServ Schulassistent
  description: Hilft dir, bei Elternbriefen und Benachrichtigungen der Schule auf dem Laufenden zu bleiben
  long_description: >-
    Prüft neue Elternbriefe aus IServ, liest deren Inhalt, sendet Lesebestätigungen,
    lädt Anhänge herunter und zeigt Schulbenachrichtigungen an.

tools:
  iserv__check_parent_letters:
    label: Elternbriefe prüfen
    description: Liste der Elternbriefe aus der Schule abrufen
  iserv__get_parent_letter:
    label: Elternbrief lesen
    description: Den vollständigen Inhalt eines bestimmten Elternbriefes lesen
  iserv__confirm_parent_letter:
    label: Elternbrief bestätigen
    description: Lesebestätigung für einen Elternbrief senden
    approval:
      label: Empfang bestätigen
      message: "Lesebestätigung für diesen Elternbrief senden? Dies kann nicht rückgängig gemacht werden."
  iserv__download_attachment:
    label: Anhang herunterladen
    description: Einen Dateianhang aus einem Elternbrief herunterladen
  iserv__check_notifications:
    label: Benachrichtigungen prüfen
    description: Aktuelle Benachrichtigungen aus IServ abrufen
